apiVersion: v1
kind: Deployment
metadata:
  name: myapp-deploy
spec:
  replicas: 2
  selector:
    matchLabels: myapp
  template:
    metadata:
      labels: app:myapp
    spec:
      containers:
        - name: myapp
          image: myapp:v1
          ports: 
		- containerPort:5000
          imagePullPolicy : IfNotPresent

